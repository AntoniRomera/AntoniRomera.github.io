<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Profile photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11183a"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" rx="40" fill="url(#bg)"/>
  <!-- simple avatar silhouette -->
  <circle cx="300" cy="235" r="92" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.8"/>
  <path d="M150 470c0-83 67-150 150-150s150 67 150 150" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.8"/>
  <text x="300" y="540" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#9aa3b8">Add your photo</text>
  <text x="300" y="578" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#6b7390">assets/profile.jpg</text>
</svg>
